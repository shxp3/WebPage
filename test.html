<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>GIF Upload</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    padding: 50px;
    background: #111;
    color: white;
}

input {
    margin: 20px;
}

img {
    max-width: 300px;
    display: block;
    margin: 20px auto;
    border-radius: 10px;
}

.link-box {
    background: #222;
    padding: 10px;
    border-radius: 5px;
    word-break: break-all;
}
</style>
</head>
<body>

<h1>อัป GIF แล้วเอาลิงก์ไปใช้</h1>

<input type="file" id="fileInput" accept="image/gif">

<img id="preview" src="">

<div class="link-box" id="linkBox">ลิงก์จะขึ้นตรงนี้</div>

<script>
const input = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const linkBox = document.getElementById("linkBox");

input.addEventListener("change", () => {
    const file = input.files[0];

    if (!file) return;

    // preview
    const url = URL.createObjectURL(file);
    preview.src = url;

    linkBox.innerText = "⚠️ อันนี้ยังใช้ใน Discord ไม่ได้ ต้องอัปโหลดขึ้นเว็บก่อน";
});
</script>

</body>
</html>
