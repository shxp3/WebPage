<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Upload to GitHub</title>
<style>
body { font-family:sans-serif; text-align:center; background:#111; color:#fff; padding:50px; }
img { max-width:300px; margin-top:20px; border-radius:10px; }
button { padding:10px; margin-top:10px; }
</style>
</head>
<body>

<h1>อัปรูปขึ้น GitHub 🚀</h1>

<input type="file" id="fileInput" accept="image/png, image/jpeg, image/gif">
<br>
<button onclick="upload()">UPLOAD</button>

<img id="preview">
<p id="result"></p>

<script>
const TOKEN = "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";
const USERNAME = "shxp3";
const REPO = "WebPage";

let file;

document.getElementById("fileInput").addEventListener("change", e => {
    file = e.target.files[0];

    if (!file) return;

    document.getElementById("preview").src = URL.createObjectURL(file);
});

async function upload() {
    if (!file) return alert("เลือกไฟล์ก่อนดิ 😑");

    const reader = new FileReader();

    reader.onload = async function() {
        const base64 = reader.result.split(",")[1];

        const fileName = Date.now() + "_" + file.name;

        const res = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/images/${fileName}`, {
            method: "PUT",
            headers: {
                "Authorization": `Bearer ${TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: "upload image",
                content: base64
            })
        });

        const data = await res.json();

        const rawURL = `https://raw.githubusercontent.com/${USERNAME}/${REPO}/main/images/${fileName}`;

        document.getElementById("result").innerHTML = `
            ✅ อัปเสร็จแล้ว<br>
            <a href="${rawURL}" target="_blank">${rawURL}</a>
        `;
    };

    reader.readAsDataURL(file);
}
</script>

</body>
</html>
