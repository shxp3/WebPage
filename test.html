<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>My Images</title>

<style>
body {
    background: #111;
    color: white;
    text-align: center;
    font-family: sans-serif;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.gallery img:hover {
    transform: scale(1.05);
}
</style>
</head>
<body>

<h1>รูปทั้งหมด</h1>

<div class="gallery" id="gallery"></div>

<script>
const USERNAME = "shxp3";
const REPO = "WebPage";
const FOLDER = "images";

async function loadImages() {
    const res = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER}`);
    const data = await res.json();

    const gallery = document.getElementById("gallery");

    data.forEach(file => {
        if (file.type === "file") {

            // รองรับ png jpg gif
            if (file.name.match(/\.(png|jpg|jpeg|gif)$/i)) {

                const img = document.createElement("img");

                // ใช้ raw link
                const rawURL = file.download_url;

                img.src = rawURL;

                // กดแล้วเปิดรูปเปล่า (เอาไปวาง Discord ได้)
                img.onclick = () => {
                    window.open(rawURL, "_blank");
                };

                gallery.appendChild(img);
            }
        }
    });
}

loadImages();
</script>

</body>
</html>
